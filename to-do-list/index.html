<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>오늘의 할일</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="tailwind.css">
</head>
<body>
  <header class="py-6 px-4 md:px-8 bg-gradient-to-r from-rose-50 via-amber-50 to-teal-50">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <h1 class="text-2xl font-semibold text-slate-800">오늘의 할일</h1>
      <div id="today-date" class="text-sm text-slate-600"></div>
    </div>
  </header>

  <main class="app-main max-w-3xl mx-auto p-4">
    <form id="task-form" class="grid gap-3 md:grid-cols-[1fr_160px_120px_80px] mb-4" aria-label="오늘의 할일 추가">
      <label for="task-title" class="visually-hidden">할 일 제목</label>
      <input id="task-title" type="text" placeholder="오늘 할 일을 입력하고 Enter를 누르세요" required aria-required="true" class="p-3 rounded-lg border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-rose-200">

      <label for="task-note" class="visually-hidden">메모</label>
      <input id="task-note" type="text" placeholder="메모 (선택)" class="p-3 rounded-lg border border-slate-200 shadow-sm">

      <label for="task-priority" class="visually-hidden">우선순위</label>
      <select id="task-priority" aria-label="우선순위" class="p-3 rounded-lg border border-slate-200 bg-white">
        <option value="low">낮음</option>
        <option value="normal" selected>보통</option>
        <option value="high">높음</option>
      </select>

      <button type="submit" id="add-btn" class="bg-rose-300 hover:bg-rose-400 text-white rounded-lg p-3 font-medium">추가</button>
    </form>

    <section class="flex items-center justify-between mb-3">
      <div class="filters flex gap-2" role="tablist" aria-label="필터">
        <button class="filter-btn px-3 py-1 rounded-lg bg-white shadow-sm" data-filter="all" aria-pressed="true">전체</button>
        <button class="filter-btn px-3 py-1 rounded-lg bg-white shadow-sm" data-filter="active">미완료</button>
        <button class="filter-btn px-3 py-1 rounded-lg bg-white shadow-sm" data-filter="completed">완료</button>
      </div>
      <div class="text-sm text-slate-600" aria-live="polite" id="counts"></div>
    </section>

    <ul id="task-list" class="bg-white rounded-lg shadow-sm divide-y divide-slate-100" aria-live="polite"></ul>
  </main>

  <footer class="text-center text-slate-500 text-sm py-6">로컬에 저장됩니다 • 민감정보는 저장하지 마세요</footer>

  <script src="app.js" defer></script>
</body>
</html>
